<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotspot Reyhan Azka</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background hutan */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            filter: brightness(0.4);
            z-index: 1;
        }

        /* overlay hijau */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,255,100,0.2), rgba(0,0,0,0.8));
            z-index: 2;
        }

        /* container */
        .login-container {
            position: relative;
            z-index: 3;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            color: #fff;
            border: 1px solid #00ff88;
            box-shadow: 0 0 25px #00ff88;
        }

        /* Neon text */
        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow:
                0 0 5px #00ff88,
                0 0 10px #00ff88,
                0 0 20px #00ff88;
        }

        .info {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #bfffdc;
        }

        label {
            display: block;
            margin-bottom: 15px;
            text-align: left;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            background: transparent;
            color: #00ff88;
            outline: none;
            box-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        input::placeholder {
            color: #88ffcc;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #00ff88;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px #00ff88;
        }

        input[type="submit"]:hover {
            background: #00cc66;
            box-shadow: 0 0 25px #00ff88;
        }

        .powered {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="login-container">
        <h1>🌿Reyhan Hotspot🌿</h1>
        <p class="info">Login untuk menikmati internet dengan nuansa alam yang tenang</p>

        <form name="login" action="/login" method="post">
            <label>
                Username
                <input type="text" name="username" placeholder="Masukkan username" required>
            </label>

            <label>
                Password
                <input type="password" name="password" placeholder="Masukkan password" required>
            </label>

            <input type="submit" value="Connect">
        </form>

        <p class="powered">Powered by MikroTik RouterOS</p>
    </div>

</body>
</html>
